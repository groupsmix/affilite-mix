name: Deploy to Cloudflare

on:
  push:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'placeholder' }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'placeholder' }}
  SITE_OVERRIDE: arabic-tools

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build the OpenNext bundle
      - run: npx @opennextjs/cloudflare build

      # Deploy to Cloudflare Workers
      - name: Deploy to Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy to Cloudflare Pages (pre-bundled worker + static assets)
      - name: Prepare Pages deployment
        run: |
          npx wrangler deploy --dry-run --outdir .open-next/bundled
          mkdir -p .pages-deploy
          cp .open-next/bundled/worker.js .pages-deploy/_worker.js
          cp -r .open-next/assets/* .pages-deploy/
          echo '{"version":1,"include":["/*"],"exclude":["/_next/static/*","/BUILD_ID"]}' > .pages-deploy/_routes.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Pages
        run: npx wrangler pages deploy .pages-deploy --project-name=affilite-mix --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
