name: Deploy to Cloudflare

on:
  push:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  SUPABASE_SERVICE_ROLE_KEY: placeholder
  JWT_SECRET: ci-test-secret
  ADMIN_PASSWORD: ci-test-password
  SITE_OVERRIDE: arabic-tools

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Build with @opennextjs/cloudflare
      - run: npx opennextjs-cloudflare build

      # Deploy to Cloudflare Workers
      - name: Deploy to Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Build bundled worker for Pages
      - name: Bundle worker for Pages
        run: npx wrangler deploy --dry-run --outdir=.open-next/bundled
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Prepare Pages output directory
      - name: Prepare Pages output
        run: |
          mkdir -p .open-next/pages-output
          cp -r .open-next/assets/* .open-next/pages-output/
          cp .open-next/bundled/worker.js .open-next/pages-output/_worker.js
          echo '{"version":1,"include":["/*"],"exclude":[]}' > .open-next/pages-output/_routes.json

      # Deploy to Cloudflare Pages
      - name: Deploy to Pages
        run: npx wrangler pages deploy .open-next/pages-output --project-name=affilite-mix --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
